<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Level 1 — Variables</title>

<style>
body{margin:0;font-family:Consolas,monospace;background:#0f172a;color:white}
.topbar{display:flex;justify-content:space-between;padding:12px 24px;background:#1e293b}
.progress{width:40%;height:12px;background:#334155;border-radius:10px;overflow:hidden}
.progress div{height:100%;width:0%;background:limegreen;transition:.4s}
.container{display:flex;height:calc(100vh - 60px)}
.left{width:40%;padding:20px;background:#111827;overflow:auto}
.left iframe{width:100%;height:220px;border-radius:10px;margin:10px 0}
.right{width:60%;display:flex;flex-direction:column;padding:20px}
textarea{flex:1;background:#0b1020;color:#00ffcc;font-size:16px;border:none;padding:15px;border-radius:10px}
.choice{margin:8px 0;padding:8px;background:#1f2937;border-radius:6px;cursor:pointer}
.output{background:#1e293b;padding:10px;border-radius:8px;margin-top:10px;min-height:60px}
.congrats{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;font-size:48px;color:gold;flex-direction:column;display:none}
</style>
</head>

<body>

<div class="topbar">
<div>❤️ <span id="lives"></span> | ⭐ <span id="xp">0</span> | 🪙 <span id="coins">0</span></div>
<div class="progress"><div id="bar"></div></div>
</div>

<div class="container">
<div class="left">
<h2>Variables in Java</h2>
<p>Variables store data. You must declare type, name, and value.</p>
<iframe src="https://www.youtube.com/embed/so1iUWaLmKA" allowfullscreen></iframe>
<div id="lesson"></div>
</div>

<div class="right">
<div id="questionArea"></div>
<textarea id="code" placeholder="Write code here..."></textarea>
<button onclick="submitAnswer()">Submit</button>
<div class="output" id="output"></div>
</div>
</div>

<div class="congrats" id="congrats">
🎉 CONGRATULATIONS 🎉
<button onclick="location.href='index.html'">Back Home</button>
</div>

<script>
let extraLives = parseInt(localStorage.getItem("extraLives") || 0);
localStorage.setItem("extraLives",0);

let lives=3+extraLives, xp=0, progress=0;
let coins=parseInt(localStorage.getItem("coins")||0);

document.getElementById("lives").innerText=lives;
document.getElementById("coins").innerText=coins;

const questions=[
{
type:"choice",
lesson:"Choose the correct declaration:",
q:"Which is valid?",
choices:["age = 10;","int age = 10;","num age = 10;"],
a:1
},
{
type:"type",
lesson:"Create TWO variables and print their sum.",
q:"Create int a=5, int b=7, then print a+b.",
check:(c)=>c.includes("int a")&&c.includes("5")&&c.includes("int b")&&c.includes("7")&&c.includes("println")&&c.includes("a+b"),
hint:"You need two ints and print their sum."
},
{
type:"type",
lesson:"Use a String variable.",
q:"Create String name=\"Alex\" and print: Hello Alex",
check:(c)=>c.includes("String name")&&c.includes("Alex")&&c.includes("println")&&c.includes("Hello"),
hint:"Use String and concatenate."
},
{
type:"type",
lesson:"Use a double and math.",
q:"Create double price=4.5 and print price*2",
check:(c)=>c.includes("double price")&&c.includes("4.5")&&c.includes("println")&&c.includes("price*2"),
hint:"Use double and multiply."
}
];

let current=0;

function loadQ(){
let q=questions[current];
document.getElementById("lesson").innerText=q.lesson;
let qa=document.getElementById("questionArea");
qa.innerHTML="<h3>"+q.q+"</h3>";
if(q.type==="choice"){
document.getElementById("code").style.display="none";
q.choices.forEach((c,i)=>qa.innerHTML+=`<div class='choice' onclick='choose(${i})'>${c}</div>`);
}else{
document.getElementById("code").style.display="block";
}
updateBar();
}

function choose(i){
if(i===questions[current].a) correct();
else wrong("Review the lesson.");
}

function submitAnswer(){
let q=questions[current];
let code=document.getElementById("code").value;
if(q.check(code)) correct();
else wrong(q.hint);
}

function correct(){
xp+=20;coins+=10;progress+=25;
localStorage.setItem("coins",coins);
document.getElementById("xp").innerText=xp;
document.getElementById("coins").innerText=coins;
document.getElementById("output").innerText="✅ Correct!";
current++;
if(current>=questions.length){
document.getElementById("congrats").style.display="flex";
}else loadQ();
}

function wrong(hint){
lives--;
document.getElementById("lives").innerText=lives;
document.getElementById("output").innerText="❌ "+hint;
if(lives<=0){alert("Out of lives!");location.reload();}
}

function updateBar(){
document.getElementById("bar").style.width=progress+"%";
}

loadQ();
</script>

</body>
</html>
