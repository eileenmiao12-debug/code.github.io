<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1 - Variables</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(120deg,#c3e0ff,#f4f9ff);
  text-align:center;
  margin:0;
  padding:20px;
}
h1{color:#2f80ed;}
.lesson,.question{
  background:white;
  padding:20px;
  border-radius:12px;
  max-width:800px;
  margin:20px auto;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  text-align:left;
  animation:fade 0.5s;
}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
button{
  padding:10px 20px;
  margin-top:15px;
  border:none;
  border-radius:6px;
  background:#00796b;
  color:white;
  cursor:pointer;
}
button:hover{background:#004d40}
#lives{font-size:18px;color:red;font-weight:bold}
#xpbar{
  width:80%;height:20px;background:#ddd;margin:10px auto;border-radius:10px;overflow:hidden;
}
#xpfill{
  height:100%;width:0%;background:#56ccf2;transition:width 0.4s;
}
.correct{color:green;font-weight:bold}
.wrong{color:red;font-weight:bold}
#congrats{
  display:none;
  font-size:40px;
  font-weight:bold;
  color:#2f80ed;
  animation:pop 1s infinite alternate;
}
@keyframes pop{from{transform:scale(1)}to{transform:scale(1.1)}}
</style>
</head>

<body>

<h1>Level 1: Variables</h1>
<div id="lives">❤️ Lives: 3</div>
<div id="xpbar"><div id="xpfill"></div></div>

<!-- Lesson -->
<div class="lesson" id="lesson">
<h2>What is a Variable?</h2>
<p>A variable stores data in Java.</p>
<pre>int age = 16;</pre>

<iframe width="100%" height="315"
src="https://www.youtube.com/embed/so1iUWaLmKA"
allowfullscreen></iframe>

<button onclick="startGame()">Start Practice</button>
</div>

<div id="game"></div>

<div id="congrats">🎉 CONGRATULATIONS! 🎉</div>

<a href="index.html">⬅ Back Home</a>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>
let lives=3, xp=0, questionIndex=0, reviveMode=false, reviveIndex=0;

const questions=[
 {type:"mcq",q:"Which is correct integer variable?",opts:["int age = 16;","double age = 16;","String age = 16;"],ans:"int age = 16;"},
 {type:"typing",q:"Type: int age = 16;",ans:"int age = 16;",hint:"Use int and semicolon"},
 {type:"mcq",q:"Which stores decimal numbers?",opts:["double","int","String"],ans:"double"}
];

const reviveQs=[
 {q:"Type: int score = 10;",a:"int score = 10;"},
 {q:"Which type stores text?",opts:["String","int","double"],a:"String"},
 {q:"Type: double pi = 3.14;",a:"double pi = 3.14;"},
 {q:"Which stores whole numbers?",opts:["int","double","String"],a:"int"},
 {q:"Type: String name = \"Bob\";",a:'String name = "Bob";'}
];

function updateXP(){
 xp+=20;
 document.getElementById("xpfill").style.width=xp+"%";
}

function loseLife(){
 lives--;
 document.getElementById("lives").innerText="❤️ Lives: "+lives;
 document.getElementById("wrongSound").play();
 if(lives<=0){
   reviveMode=true;
   reviveIndex=0;
   alert("No lives! Complete 5 revive questions!");
   showRevive();
 }
}

function correctAnswer(){
 document.getElementById("correctSound").play();
 updateXP();
 nextQuestion();
}

function startGame(){
 document.getElementById("lesson").style.display="none";
 showQuestion();
}

function showQuestion(){
 const g=document.getElementById("game");
 g.innerHTML="";
 if(questionIndex>=questions.length){
   document.getElementById("congrats").style.display="block";
   return;
 }
 const q=questions[questionIndex];
 const div=document.createElement("div");
 div.className="question";
 div.innerHTML="<p>"+q.q+"</p>";

 if(q.type==="mcq"){
   q.opts.forEach(o=>{
     const b=document.createElement("button");
     b.innerText=o;
     b.onclick=()=> o===q.ans?correctAnswer():loseLife();
     div.appendChild(b);
   });
 }else{
   const ta=document.createElement("textarea");
   div.appendChild(ta);
   const b=document.createElement("button");
   b.innerText="Submit";
   b.onclick=()=>{
     ta.value.trim()===q.ans?correctAnswer():(alert("Hint: "+q.hint),loseLife());
   };
   div.appendChild(b);
 }
 g.appendChild(div);
}

function nextQuestion(){
 questionIndex++;
 showQuestion();
}

function showRevive(){
 const g=document.getElementById("game");
 g.innerHTML="";
 const r=reviveQs[reviveIndex];
 const div=document.createElement("div");
 div.className="question";
 div.innerHTML="<p>Revive Question "+(reviveIndex+1)+": "+r.q+"</p>";

 if(r.opts){
   r.opts.forEach(o=>{
     const b=document.createElement("button");
     b.innerText=o;
     b.onclick=()=>checkRevive(o,r.a);
     div.appendChild(b);
   });
 }else{
   const ta=document.createElement("textarea");
   div.appendChild(ta);
   const b=document.createElement("button");
   b.innerText="Submit";
   b.onclick=()=>checkRevive(ta.value.trim(),r.a);
   div.appendChild(b);
 }
 g.appendChild(div);
}

function checkRevive(ans,correct){
 if(ans===correct){
   reviveIndex++;
   if(reviveIndex>=reviveQs.length){
     lives=2;
     reviveMode=false;
     alert("Revived! Back to game!");
     showQuestion();
   }else showRevive();
 }else alert("Try again!");
}
</script>

</body>
</html>
