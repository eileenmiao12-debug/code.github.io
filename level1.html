<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaQuest Level 1 - Variables</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f8ff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { margin-bottom: 10px; }
    .lesson {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 800px;
      margin: 20px auto;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      text-align: left;
    }
    iframe {
      width: 100%;
      height: 360px;
      margin-top: 10px;
      border-radius: 8px;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-top: 15px;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background-color: #00796b;
      color: white;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
    .back {
      margin-top: 20px;
      display: inline-block;
      text-decoration: none;
      font-weight: bold;
      color: #00796b;
    }
    #lives {
      font-weight: bold;
      font-size: 18px;
      color: red;
      margin-top: 10px;
    }
    .question {
      margin-top: 15px;
    }
    .option-btn {
      display: block;
      margin: 8px 0;
      padding: 8px 15px;
      border: 1px solid #00796b;
      border-radius: 5px;
      cursor: pointer;
      background: white;
      transition: 0.2s;
    }
    .option-btn:hover {
      background: #b2dfdb;
    }
  </style>
</head>
<body>

<h1>Level 1: Variables</h1>
<div id="lives">❤️ Lives: 3</div>

<div class="lesson">
  <h2>Lesson 1: Variables in Java</h2>
  <p>Variables store data in your program. For example:</p>
  <pre>int age = 16;</pre>
  <p>You can watch this video for more explanation:</p>
  <iframe src="https://www.youtube.com/embed/Yo8pGgM-7jA" title="YouTube video lesson" allowfullscreen></iframe>
</div>

<div id="question-container"></div>

<a class="back" href="index.html">⬅ Back to Homepage</a>

<script>
const livesDisplay = document.getElementById("lives");
let lives = 3;

// 定义题目
const questions = [
  {type:"typing", question:"Create an integer variable named age and assign it 16.", answer:"int age = 16;", hint:"Use int followed by variable name and = value;"},
  {type:"mcq", question:"Which type stores whole numbers?", options:["int","double","String"], answer:"int"},
  {type:"match", question:"Match variable types with examples:", pairs:[["int","5"],["double","3.14"],["String","\"Hello\""]]},
  {type:"typing", question:"Create a variable called name with value \"Alice\".", answer:'String name = "Alice";', hint:"Use String and quotes for text."},
  {type:"mcq", question:"What is the correct way to declare a double?", options:["double x = 5.0;","int x = 5;","String x = 5;"], answer:"double x = 5.0;"}
];

const reviveQuestions = [
  {type:"typing", question:"Create int variable score=10", answer:"int score = 10;", hint:"Use int variableName = value;"},
  {type:"mcq", question:"Which is correct to store text?", options:["String","int","boolean"], answer:"String"},
  {type:"typing", question:"Create variable isReady=true", answer:"boolean isReady = true;", hint:"Use boolean variableName = true;"},
  {type:"mcq", question:"Which stores decimal numbers?", options:["double","int","String"], answer:"double"},
  {type:"typing", question:"Create variable pi=3.14", answer:"double pi = 3.14;", hint:"Use double variableName = value;"}
];

let currentQ = 0;
let inRevive = false;

function showQuestion() {
  const container = document.getElementById("question-container");
  container.innerHTML = "";

  const q = inRevive ? reviveQuestions[currentQ] : questions[currentQ];

  const qDiv = document.createElement("div");
  qDiv.className = "question";

  const qText = document.createElement("p");
  qText.innerText = q.question;
  qDiv.appendChild(qText);

  if(q.type === "typing") {
    const ta = document.createElement("textarea");
    ta.id = "user-input";
    ta.placeholder = "Type your answer here...";
    qDiv.appendChild(ta);

    const btn = document.createElement("button");
    btn.innerText = "Submit";
    btn.onclick = checkTyping;
    qDiv.appendChild(btn);

  } else if(q.type === "mcq") {
    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.className = "option-btn";
      btn.onclick = () => checkMCQ(opt);
      qDiv.appendChild(btn);
    });

  } else if(q.type === "match") {
    q.pairs.forEach(([key,val],i)=>{
      const p = document.createElement("p");
      p.innerText = `${key} → ${val}`;
      qDiv.appendChild(p);
    });
    const btn = document.createElement("button");
    btn.innerText = "Next";
    btn.onclick = nextQuestion;
    qDiv.appendChild(btn);
  }

  container.appendChild(qDiv);
}

function checkTyping() {
  const userInput = document.getElementById("user-input").value.trim();
  const correctAnswer = (inRevive ? reviveQuestions[currentQ].answer : questions[currentQ].answer).trim();
  const hint = (inRevive ? reviveQuestions[currentQ].hint : questions[currentQ].hint);

  if(userInput === correctAnswer){
    alert("✅ Correct!");
    nextQuestion();
  } else {
    alert("❌ Wrong! Hint: " + hint);
    loseLife();
  }
}

function checkMCQ(selected) {
  const correct = inRevive ? reviveQuestions[currentQ].answer : questions[currentQ].answer;
  if(selected === correct){
    alert("✅ Correct!");
    nextQuestion();
  } else {
    alert("❌ Wrong!");
    loseLife();
  }
}

function nextQuestion() {
  currentQ++;
  const qList = inRevive ? reviveQuestions : questions;
  if(currentQ >= qList.length){
    if(inRevive){
      alert("🎉 You are revived! Back to main questions.");
      inRevive = false;
      lives = 1;
      livesDisplay.innerText = "❤️ Lives: " + lives;
      currentQ = 0;
    } else {
      alert("🎉 Level 1 completed!");
      window.location.href = "level2.html";
      return;
    }
  }
  showQuestion();
}

function loseLife() {
  lives--;
  if(lives <= 0){
    alert("💀 You lost all lives! Answer 5 revive questions to continue.");
    inRevive = true;
    currentQ = 0;
  }
  livesDisplay.innerText = "❤️ Lives: " + lives;
}

// 初始化
showQuestion();
</script>
</body>
</html>
