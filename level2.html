<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaQuest Level 2 - If/Else</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background: #fff7e6; margin: 0; padding: 30px; text-align: center; }
    h1 { margin-bottom: 10px; }
    .task { background: white; padding: 20px; border-radius: 10px; max-width: 800px; margin: 20px auto; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: left; }
    textarea { width: 100%; height: 180px; margin-top: 15px; font-family: monospace; font-size: 14px; padding: 10px; }
    button { margin-top: 15px; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 6px; border: none; }
    #result { margin-top: 15px; font-weight: bold; font-size: 18px; }
    .back { margin-top: 20px; display: inline-block; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Level 2: If / Else</h1>

  <div class="task">
    <p><strong>Task:</strong> Create an integer variable <code>age</code>.  
       If <code>age</code> is 18 or more, print <code>"Adult"</code>, else print <code>"Minor"</code>.</p>
    <p>Example format:</p>
    <pre>if(age &gt;= 18){ System.out.println("Adult"); } else { System.out.println("Minor"); }</pre>

    <textarea id="code" placeholder="Type your Java code here..."></textarea>
    <button onclick="checkCode()">Run Code</button>

    <div id="result"></div>
  </div>

  <a class="back" href="index.html">⬅ Back to Levels</a>

  <script>
    function normalize(text) { return text.replace(/\s+/g,'').toLowerCase(); }

    function checkCode() {
      const userCode = normalize(document.getElementById("code").value);
      const acceptedPatterns = [
        'intage=', // declare variable
        'if(age>=18){system.out.println("adult");}else{system.out.println("minor");}',
        'if(age>=18){system.out.println("adult");}else{system.out.println("minor")}'
      ];

      const isCorrect = acceptedPatterns.every(pattern => userCode.includes(pattern));
      const result = document.getElementById("result");

      if(isCorrect){
        result.style.color = 'green';
        result.textContent = "✅ Correct! Well done.";
      } else {
        result.style.color = 'red';
        result.textContent = "❌ Not quite right. Hint: Use an if statement to check age and print 'Adult' or 'Minor'.";
      }
    }
  </script>
</body>
</html>
