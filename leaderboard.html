<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>JavaQuest | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; } .nav-active { background-color: #f0f7ff; color: #3b82f6; border-right: 4px solid #3b82f6; font-weight: bold; }</style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-gray-100 flex flex-col">
        <div class="p-6"><h1 class="text-xl font-bold text-indigo-600">☕ JavaQuest</h1></div>
        <nav class="flex-grow px-4 space-y-1">
            <a href="index.html" class="px-4 py-3 rounded-xl flex items-center text-gray-600 hover:bg-gray-50">🏠 Home</a>
            <a href="leaderboard.html" class="nav-active px-4 py-3 rounded-xl flex items-center">🏆 Leaderboard</a>
            <a href="challenges.html" class="px-4 py-3 rounded-xl flex items-center text-gray-600 hover:bg-gray-50">📅 Challenges</a>
        </nav>
    </aside>

    <main class="flex-grow overflow-y-auto bg-[#fcfdfe] p-8">
        <h2 class="text-2xl font-black mb-8">Global Rankings</h2>
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden max-w-4xl">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-[10px] font-black text-gray-400 uppercase">
                    <tr><th class="px-6 py-4">Rank</th><th class="px-6 py-4">Coder</th><th class="px-6 py-4">Level</th><th class="px-6 py-4">XP</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr><td class="px-6 py-6 font-bold text-blue-600">#1</td><td class="px-6 py-6 font-bold">👑 Java_God</td><td class="px-6 py-6 font-bold text-sm">LVL 50</td><td class="px-6 py-6 text-gray-400">120k</td></tr>
                    <tr><td class="px-6 py-6 font-bold text-gray-400">#2</td><td class="px-6 py-6 font-bold">🐱 PixelCoder</td><td class="px-6 py-6 font-bold text-sm">LVL 45</td><td class="px-6 py-6 text-gray-400">98k</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
