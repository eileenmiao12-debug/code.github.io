<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeMentor AI</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(120deg,#e0f7fa,#ffffff);
  text-align:center;
}
header{padding:60px 20px}
h1{font-size:48px;margin-bottom:10px}
button{
  padding:12px 22px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.shop{
  margin-top:40px;
  padding:20px;
  background:white;
  border-radius:12px;
  width:320px;
  margin-left:auto;
  margin-right:auto;
  box-shadow:0 8px 18px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
  <h1>CodeMentor AI</h1>
  <p>Learn Java like a game. Earn coins. Buy lives. Level up.</p>
  <button onclick="start()">Start Level 1</button>
</header>

<div class="shop">
  <h2>🛒 Shop</h2>
  <p>🪙 Coins: <span id="coinDisplay">0</span></p>
  <button onclick="buyLife()">Buy +1 Life (20 coins)</button>
  <p id="shopMsg"></p>
</div>

<script>
let coins = parseInt(localStorage.getItem("coins") || 0);
let extraLives = parseInt(localStorage.getItem("extraLives") || 0);
document.getElementById("coinDisplay").innerText = coins;

function buyLife(){
  if(coins >= 20){
    coins -= 20;
    extraLives += 1;
    localStorage.setItem("coins", coins);
    localStorage.setItem("extraLives", extraLives);
    document.getElementById("coinDisplay").innerText = coins;
    document.getElementById("shopMsg").innerText = "✅ You bought 1 extra life!";
  }else{
    document.getElementById("shopMsg").innerText = "❌ Not enough coins!";
  }
}

function start(){
  window.location.href="level1.html";
}
</script>

</body>
</html>
