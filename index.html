<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest — Learn Java Like a Game</title>
    <style>
        :root {
            --primary: #4caf50;
            --primary-dark: #388e3c;
            --secondary: #2196f3;
            --bg: #f4f7f6;
            --text: #333;
            --card-bg: #fff;
            --danger: #f44336;
            --warning: #ffeb3b;
            --coin: #ffc107;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header / HUD --- */
        header {
            background-color: var(--card-bg);
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
        }

        .hud {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }

        .icon { font-size: 1.2em; }
        .lives { color: var(--danger); }
        .coins { color: var(--coin); }
        .streak { color: #ff9800; }

        /* --- Main Content Area --- */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* --- Screens --- */
        .screen { display: none; }
        .screen.active { display: block; }

        /* --- Map Screen --- */
        .map-path {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
        }

        .level-node {
            width: 80px;
            height: 80px;
            background-color: #e0e0e0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2em;
            color: #999;
            cursor: not-allowed;
            border: 4px solid #bdbdbd;
            box-shadow: 0 4px 0 #bdbdbd;
            transition: all 0.2s;
            position: relative;
        }

        .level-node.unlocked {
            background-color: var(--card-bg);
            color: var(--primary);
            cursor: pointer;
            border-color: var(--primary);
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        .level-node.unlocked:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--primary-dark);
        }

        .level-node.completed {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary-dark);
        }
        
        .level-tooltip {
            position: absolute;
            bottom: -30px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .level-node:hover .level-tooltip {
            opacity: 1;
        }

        .map-connector {
            width: 10px;
            height: 30px;
            background-color: #e0e0e0;
        }
        .map-connector.unlocked {
            background-color: #a5d6a7;
        }

        /* --- Game Screen --- */
        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #lesson-area {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .code-block {
            background-color: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: auto;
            margin: 10px 0;
            white-space: pre;
        }
        
        .code-comment { color: #75715e; }
        .code-keyword { color: #f92672; }
        .code-string { color: #e6db74; }
        .code-type { color: #66d9ef; }

        #question-area h3 { margin-top: 0; }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
            text-align: left;
        }

        .option-btn:hover { background-color: #e0e0e0; }
        .option-btn.correct {
            background-color: #c8e6c9;
            border-color: var(--primary);
            color: var(--primary-dark);
        }
        .option-btn.wrong {
            background-color: #ffcdd2;
            border-color: var(--danger);
            color: #b71c1c;
        }

        #game-message {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
            min-height: 1.2em;
        }

        .next-btn {
            display: none;
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
        }

        /* --- Footer Nav --- */
        footer {
            background-color: var(--card-bg);
            padding: 10px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-around;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 1em;
            cursor: pointer;
            padding: 5px 10px;
        }

        .nav-btn.active {
            color: var(--primary);
            font-weight: bold;
        }
        
        /* Utils */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="showScreen('map')">CodeQuest</a>
        <div class="hud">
            <div class="hud-item streak"><span class="icon">🔥</span> <span id="streak-val">0</span></div>
            <div class="hud-item coins"><span class="icon">🪙</span> <span id="coins-val">100</span></div>
            <div class="hud-item lives"><span class="icon">❤️</span> <span id="lives-val">3</span></div>
        </div>
    </header>

    <main>
        <div class="container">
            
            <div id="screen-map" class="screen active">
                <h2 style="text-align:center;">Java Fundamentals Path</h2>
                <div class="map-path" id="map-path">
                    </div>
            </div>

            <div id="screen-game" class="screen">
                <div class="game-card">
                    <div id="lesson-area">
                        <h2 id="lesson-title">Lesson</h2>
                        <p id="lesson-text"></p>
                        <div id="lesson-code" class="code-block"></div>
                        <button class="next-btn" style="display:block;" onclick="startQuiz()">Start Quiz</button>
                    </div>

                    <div id="question-area" class="hidden">
                        <div style="display:flex; justify-content:space-between;color:#777; font-size:0.9em">
                            <span id="game-mode-display">Mode: Survival</span>
                            <span id="progress-text">Question 1/5</span>
                        </div>
                        <h3 id="question-text"></h3>
                        <div id="question-code" class="code-block hidden"></div>
                        <div class="options-grid" id="options-container">
                            </div>
                        <div id="game-message"></div>
                        <button id="next-q-btn" class="next-btn" onclick="nextQuestion()">Next Question</button>
                        <button id="finish-btn" class="next-btn" onclick="finishLevel()">Finish Level</button>
                    </div>
                </div>
            </div>

            <div id="screen-shop" class="screen">
                <h2>Shop</h2>
                <div class="game-card">
                    <p>Welcome to the shop! Spend your hard-earned coins here.</p>
                    <button onclick="buyLife()" style="padding:10px; background:var(--coin); border:none; border-radius:4px; cursor:pointer;">Buy +1 Life ❤️ (50 Coins)</button>
                </div>
            </div>
            
            <div id="screen-profile" class="screen">
                <h2>Profile</h2>
                <div class="game-card">
                    <p>Stats and Achievements coming soon!</p>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <button class="nav-btn active" onclick="showScreen('map', this)">🗺️ Map</button>
        <button class="nav-btn" onclick="showScreen('shop', this)">🛍️ Shop</button>
        <button class="nav-btn" onclick="showScreen('profile', this)">👤 Profile</button>
    </footer>

    <script>
        // --- DATA ---
        
        const levels = [
            { id: 1, title: "Output & Variables", theme: "basics" },
            { id: 2, title: "Operators", theme: "math" },
            { id: 3, title: "Conditions (If/Else)", theme: "logic" },
            { id: 4, title: "Loops", theme: "repetition" },
            { id: 5, title: "Arrays", theme: "data" }
        ];

        // Content for the first 2 levels to demonstrate
        const gameContent = {
            1: {
                lesson: {
                    title: "Level 1: Output & Variables",
                    text: "In Java, we use <code>System.out.println()</code> to print text to the screen. To store data, we use <b>variables</b>. A <code>String</code> stores text, and an <code>int</code> stores integers (whole numbers).",
                    code: `<span class="code-type">String</span> name = <span class="code-string">"Alice"</span>; <span class="code-comment">// Stores text</span>\n<span class="code-type">int</span> age = <span class="code-string">25</span>;           <span class="code-comment">// Stores a number</span>\nSystem.out.println(name); <span class="code-comment">// Prints: Alice</span>`
                },
                questions: [
                    {
                        type: "mcq",
                        q: "Which keyword is used to declare a variable that stores whole numbers?",
                        options: ["String", "int", "double", "boolean"],
                        answer: 1 // index of "int"
                    },
                    {
                        type: "code_output",
                        q: "What is the output of this code?",
                        code: `<span class="code-type">int</span> score = <span class="code-string">10</span>;\nscore = <span class="code-string">20</span>; <span class="code-comment">// Re-assigning</span>\nSystem.out.println(score);`,
                        options: ["10", "20", "score", "Error"],
                        answer: 1
                    },
                    {
                        type: "mcq",
                        q: "How do you correctly print \"Hello\" to the console?",
                        options: ["print(\"Hello\");", "Console.log(\"Hello\");", "System.out.println(\"Hello\");", "Println(\"Hello\");"],
                        answer: 2
                    }
                ]
            },
            2: {
                lesson: {
                    title: "Level 2: Operators",
                    text: "Java uses standard math operators: <code>+</code> (add), <code>-</code> (subtract), <code>*</code> (multiply), <code>/</code> (divide). The <b>modulo</b> operator <code>%</code> returns the remainder of a division.",
                    code: `<span class="code-type">int</span> sum = <span class="code-string">5</span> + <span class="code-string">3</span>;      <span class="code-comment">// 8</span>\n<span class="code-type">int</span> rem = <span class="code-string">10</span> % <span class="code-string">3</span>;    <span class="code-comment">// 1 (Remainder of 10/3)</span>`
                },
                questions: [
                    {
                        type: "mcq",
                        q: "What is the result of <code>15 / 3</code> in Java?",
                        options: ["3", "5", "15", "0"],
                        answer: 1
                    },
                    {
                        type: "code_output",
                        q: "What is the output?",
                        code: `<span class="code-type">int</span> x = <span class="code-string">5</span>;\n<span class="code-type">int</span> y = x * <span class="code-string">2</span>;\nSystem.out.println(y - <span class="code-string">1</span>);`,
                        options: ["9", "10", "4", "5"],
                        answer: 0
                    }
                ]
            }
        };

        // --- STATE ---
        let gameState = {
            lives: 3,
            coins: 100,
            streak: 0,
            unlockedLevel: 1,
            currentLevelData: null,
            currentQuestionIndex: 0,
            correctCount: 0
        };

        // --- DOM ELEMENTS ---
        const els = {
            lives: document.getElementById('lives-val'),
            coins: document.getElementById('coins-val'),
            streak: document.getElementById('streak-val'),
            mapPath: document.getElementById('map-path'),
            screens: document.querySelectorAll('.screen'),
            navBtns: document.querySelectorAll('.nav-btn'),
            // Game screen els
            lessonArea: document.getElementById('lesson-area'),
            questionArea: document.getElementById('question-area'),
            questionText: document.getElementById('question-text'),
            questionCode: document.getElementById('question-code'),
            optionsContainer: document.getElementById('options-container'),
            gameMsg: document.getElementById('game-message'),
            nextQBtn: document.getElementById('next-q-btn'),
            finishBtn: document.getElementById('finish-btn'),
            progressText: document.getElementById('progress-text')
        };

        // --- INITIALIZATION ---
        function init() {
            renderMap();
            updateHUD();
        }

        // --- UI & NAVIGATION ---
        function updateHUD() {
            els.lives.innerText = gameState.lives;
            els.coins.innerText = gameState.coins;
            els.streak.innerText = gameState.streak;
        }

        function showScreen(screenName, navBtn = null) {
            // Hide all screens
            els.screens.forEach(s => s.classList.remove('active'));
            // Show target screen
            document.getElementById(`screen-${screenName}`).classList.add('active');

            // Update Nav highlights
            if(navBtn) {
                els.navBtns.forEach(b => b.classList.remove('active'));
                navBtn.classList.add('active');
            }
        }

        // --- MAP LOGIC ---
        function renderMap() {
            els.mapPath.innerHTML = ''; // Clear
            
            levels.forEach((level, index) => {
                // Connector (except before first)
                if (index > 0) {
                    const connector = document.createElement('div');
                    connector.className = `map-connector ${level.id <= gameState.unlockedLevel ? 'unlocked' : ''}`;
                    els.mapPath.appendChild(connector);
                }

                // Node
                const node = document.createElement('div');
                let classes = 'level-node';
                if (level.id < gameState.unlockedLevel) classes += ' unlocked completed';
                else if (level.id === gameState.unlockedLevel) classes += ' unlocked';
                
                node.className = classes;
                node.innerHTML = `<span>${level.id}</span><div class="level-tooltip">${level.title}</div>`;

                if (level.id <= gameState.unlockedLevel) {
                    node.onclick = () => startLevel(level.id);
                }

                els.mapPath.appendChild(node);
            });
        }

        // --- GAMEPLAY LOGIC ---

        function startLevel(levelId) {
            const content = gameContent[levelId];
            if (!content) {
                alert("Content for this level is not implemented in this prototype yet (Coming soon!). Try Level 1 or 2.");
                return;
            }

            gameState.currentLevelData = content;
            gameState.currentQuestionIndex = 0;
            gameState.correctCount = 0;

            // Setup Lesson
            document.getElementById('lesson-title').innerText = content.lesson.title;
            document.getElementById('lesson-text').innerHTML = content.lesson.text;
            document.getElementById('lesson-code').innerHTML = content.lesson.code;

            // Show lesson, hide quiz
            els.lessonArea.classList.remove('hidden');
            els.questionArea.classList.add('hidden');
            showScreen('game');
        }

        function startQuiz() {
            els.lessonArea.classList.add('hidden');
            els.questionArea.classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const data = gameState.currentLevelData;
            const q = data.questions[gameState.currentQuestionIndex];
            
            // Reset UI
            els.gameMsg.innerText = '';
            els.gameMsg.style.color = '';
            els.nextQBtn.classList.add('hidden');
            els.finishBtn.classList.add('hidden');
            
            // Update progress
            els.progressText.innerText = `Question ${gameState.currentQuestionIndex + 1}/${data.questions.length}`;

            // Set Question Text
            els.questionText.innerHTML = q.q;

            // Set Code block if exists
            if (q.code) {
                els.questionCode.innerHTML = q.code;
                els.questionCode.classList.remove('hidden');
            } else {
                els.questionCode.classList.add('hidden');
            }

            // Generate Options
            els.optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = opt;
                btn.onclick = () => checkAnswer(index, btn);
                els.optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            const q = gameState.currentLevelData.questions[gameState.currentQuestionIndex];
            
            // Disable all options
            const buttons = els.optionsContainer.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (selectedIndex === q.answer) {
                // Correct
                selectedBtn.classList.add('correct');
                els.gameMsg.innerText = "Correct! +10 🪙";
                els.gameMsg.style.color = "var(--primary)";
                gameState.coins += 10;
                gameState.correctCount++;
            } else {
                // Wrong
                selectedBtn.classList.add('wrong');
                // Show correct one
                buttons[q.answer].classList.add('correct');
                
                els.gameMsg.innerText = "Wrong! -1 ❤️";
                els.gameMsg.style.color = "var(--danger)";
                gameState.lives--;
                
                if (gameState.lives <= 0) {
                    gameOver();
                    return;
                }
            }

            updateHUD();

            // Show Next or Finish button
            if (gameState.currentQuestionIndex < gameState.currentLevelData.questions.length - 1) {
                els.nextQBtn.classList.remove('hidden');
            } else {
                els.finishBtn.classList.remove('hidden');
            }
        }

        function nextQuestion() {
            gameState.currentQuestionIndex++;
            loadQuestion();
        }

        function finishLevel() {
            const currentLvlId = levels.find(l => l.title === gameState.currentLevelData.lesson.title.split(': ')[1]).id;
            
            alert(`Level Complete! You got ${gameState.correctCount} correct.`);
            
            // Unlock next level logic
            if (currentLvlId === gameState.unlockedLevel) {
                gameState.unlockedLevel++;
            }
            
            renderMap();
            showScreen('map');
        }

        function gameOver() {
            alert("Game Over! You lost all lives. Restarting app for demo.");
            // Reset state for demo
            gameState = {
                lives: 3,
                coins: 100,
                streak: 0,
                unlockedLevel: 1,
                currentLevelData: null,
                currentQuestionIndex: 0,
                correctCount: 0
            };
            updateHUD();
            renderMap();
            showScreen('map');
        }

        // --- SHOP & MISC ---
        function buyLife() {
            if (gameState.coins >= 50) {
                gameState.coins -= 50;
                gameState.lives += 1;
                updateHUD();
                alert("Bought 1 Life!");
            } else {
                alert("Not enough coins!");
            }
        }

        // Start everything
        init();

    </script>
</body>
</html>
