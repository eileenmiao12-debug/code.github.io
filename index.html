<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnKata Pro | AI Study Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; overflow: hidden; }
        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Flashcard Styling */
        .flip-card { perspective: 1000px; width: 100%; height: 350px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped .flip-card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 2.5rem; border-radius: 2.5rem; border: 1px solid #e2e8f0; text-align: center; }
        .back { background: #6366f1; color: white; transform: rotateY(180deg); }

        /* Path Animation */
        .node-path { stroke: #e2e8f0; stroke-width: 3; stroke-dasharray: 10; animation: flow 30s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -1000; } }
        
        /* Progress Bar */
        .ai-progress-fill { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-80 bg-white border-r border-slate-100 flex flex-col z-30 shadow-sm">
        <div class="p-8">
            <div class="flex items-center space-x-3 mb-10">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold italic shadow-lg">K</div>
                <h1 class="text-xl font-extrabold tracking-tighter italic">LearnKata</h1>
            </div>

            <div class="bg-slate-50 rounded-[2.5rem] p-6 mb-8 border border-slate-100 text-center">
                <div id="pet-avatar" class="text-6xl mb-4 transition-all duration-500">🥚</div>
                <div class="flex justify-between text-[10px] font-bold mb-1">
                    <span class="text-indigo-600">LVL <span id="lvl-val">1</span></span>
                    <span id="xp-text" class="text-slate-400">0/1000 XP</span>
                </div>
                <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                    <div id="xp-bar" class="h-full bg-indigo-500" style="width: 0%"></div>
                </div>
            </div>

            <nav class="space-y-2">
                <button class="w-full flex items-center space-x-4 p-4 bg-indigo-50 text-indigo-600 rounded-2xl font-bold">🗺️<span>Personalized Path</span></button>
                <button class="w-full flex items-center space-x-4 p-4 text-slate-400 hover:bg-slate-50 rounded-2xl font-bold">🏆<span>Leaderboard</span></button>
            </nav>
        </div>
    </aside>

    <main class="flex-grow overflow-y-auto relative bg-[#fafbff] no-scrollbar">
        <header class="sticky top-0 z-20 bg-white/70 backdrop-blur-xl p-8 border-b border-slate-100 flex justify-between items-center px-12">
            <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest">Exam Prep Sprint</h2>
            <button onclick="toggleUpload(true)" class="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100 hover:scale-105 transition-all">+ New Study Material</button>
        </header>

        <div id="mapContent" class="max-w-4xl mx-auto py-20 px-10 relative flex flex-col items-center opacity-20 grayscale pointer-events-none transition-all duration-1000">
            <svg class="absolute inset-0 w-full h-full pointer-events-none">
                <path d="M 450 100 Q 600 250 450 400 T 450 700" fill="none" class="node-path" />
            </svg>

            <div class="space-y-48 relative z-10 flex flex-col items-center">
                <div class="flex flex-col items-center group cursor-pointer" onclick="openHub('quiz')">
                    <div class="w-24 h-24 bg-white rounded-[2.5rem] shadow-xl flex items-center justify-center text-5xl border-2 border-indigo-600 ring-8 ring-indigo-50 transition-transform group-hover:scale-110">🧩</div>
                    <div class="mt-6 text-center">
                        <span class="px-4 py-1 bg-indigo-600 text-white text-[9px] font-black rounded-full uppercase">Concept Quiz</span>
                        <h4 class="mt-2 font-bold text-slate-800 italic" id="quiz-title">Analyzing...</h4>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="uploadModal" class="fixed inset-0 z-[100] hidden bg-white flex items-center justify-center p-12">
        <div class="max-w-xl w-full text-center">
            <h2 class="text-5xl font-black tracking-tighter mb-4 italic">Upload Material</h2>
            <p class="text-slate-400 mb-12 font-medium">Browse files or drag them here to let AI generate your path.</p>
            
            <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(this)">
            
            <div id="dropZone" 
                 onclick="document.getElementById('fileInput').click()" 
                 class="border-4 border-dashed border-slate-100 rounded-[3.5rem] p-24 mb-10 hover:border-indigo-400 hover:bg-indigo-50/50 cursor-pointer transition-all group">
                <span class="text-7xl block mb-6 transition-transform group-hover:scale-110">📂</span>
                <p id="fileLabel" class="font-black text-slate-400 uppercase tracking-widest text-sm">Click to Browse or Drag File</p>
                <p class="text-xs text-slate-300 mt-2 font-bold italic">Supports PDF, DOCX, PNG, JPG</p>
            </div>

            <button onclick="startAiProcessing()" id="startBtn" class="w-full py-6 bg-slate-100 text-slate-400 rounded-3xl font-black text-xs uppercase tracking-widest transition-all cursor-not-allowed" disabled>
                AI Initialization Required
            </button>
        </div>
    </div>

    <div id="processingOverlay" class="fixed inset-0 z-[200] hidden bg-white flex flex-col items-center justify-center text-center p-10">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl mb-8 flex items-center justify-center text-white text-3xl font-black italic shadow-2xl animate-bounce">K</div>
        <h3 class="text-3xl font-black italic tracking-tighter mb-2">LearnKata AI Engine</h3>
        <p id="aiStatus" class="text-slate-400 font-medium italic">Reading file content...</p>
        <div class="w-full max-w-xs h-1.5 bg-slate-100 rounded-full mt-8 overflow-hidden">
            <div id="aiProgress" class="ai-progress-fill h-full bg-indigo-600 w-0"></div>
        </div>
    </div>

    <div id="studyHub" class="fixed inset-0 z-[150] hidden bg-slate-950/40 backdrop-blur-xl flex items-center justify-center p-8">
        <div class="bg-white w-full max-w-3xl rounded-[3rem] shadow-2xl overflow-hidden p-16 relative">
            <button onclick="closeHub()" class="absolute top-8 right-8 text-3xl text-slate-300 hover:text-slate-900">&times;</button>
            <div id="quizArea" class="text-center">
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em] mb-4">Generated Quiz</p>
                <h2 id="qText" class="text-4xl font-black italic tracking-tight mb-12">---</h2>
                <div id="qOptions" class="grid gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        let xp = 0;
        let selectedFile = null;

        function toggleUpload(show) {
            document.getElementById('uploadModal').classList.toggle('hidden', !show);
        }

        // Logic to handle browsing from computer
        function handleFileSelect(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                document.getElementById('fileLabel').innerText = "Selected: " + selectedFile.name;
                document.getElementById('fileLabel').classList.replace('text-slate-400', 'text-indigo-600');
                
                const btn = document.getElementById('startBtn');
                btn.innerText = "Generate Path from " + selectedFile.name;
                btn.classList.replace('bg-slate-100', 'bg-indigo-600');
                btn.classList.replace('text-slate-400', 'text-white');
                btn.disabled = false;
                btn.classList.remove('cursor-not-allowed');
            }
        }

        // AI Generation Simulation
        function startAiProcessing() {
            document.getElementById('uploadModal').classList.add('hidden');
            const overlay = document.getElementById('processingOverlay');
            overlay.classList.remove('hidden');

            const steps = [
                "Scanning document layers...",
                "Extracting technical definitions...",
                "Mapping knowledge nodes...",
                "Generating practice quizzes...",
                "Finalizing study journey..."
            ];
            
            let step = 0;
            const interval = setInterval(() => {
                step++;
                document.getElementById('aiProgress').style.width = (step * 20) + "%";
                document.getElementById('aiStatus').innerText = steps[step-1];

                if(step >= steps.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.classList.add('hidden');
                        unlockMap();
                    }, 500);
                }
            }, 800);
        }

        function unlockMap() {
            document.getElementById('mapContent').classList.remove('opacity-20', 'grayscale', 'pointer-events-none');
            document.getElementById('quiz-title').innerText = "Introduction to " + (selectedFile ? selectedFile.name.split('.')[0] : "Material");
        }

        function openHub(type) {
            document.getElementById('studyHub').classList.remove('hidden');
            document.getElementById('qText').innerText = "Based on your upload, what is the core concept of the first chapter?";
            const opts = ["Primary Theory", "Secondary Evidence", "Null Hypothesis", "Control Group"];
            const container = document.getElementById('qOptions');
            container.innerHTML = "";
            opts.forEach(o => {
                container.innerHTML += `<button onclick="gainXP(250)" class="p-6 border-2 border-slate-100 rounded-[2rem] font-bold hover:border-indigo-600 hover:bg-indigo-50 transition-all">${o}</button>`;
            });
        }

        function gainXP(amount) {
            xp += amount;
            document.getElementById('xp-bar').style.width = (xp/1000*100) + "%";
            document.getElementById('xp-text').innerText = xp + "/1000 XP";
            if(xp >= 500) {
                document.getElementById('pet-avatar').innerText = "🐥";
                alert("Quest Complete! Your pet is evolving!");
            }
            closeHub();
        }

        function closeHub() { document.getElementById('studyHub').classList.add('hidden'); }
    </script>
</body>
</html>
