<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest — Learn Java Like a Game</title>
    <style>
        :root {
            --primary: #4caf50;
            --primary-dark: #388e3c;
            --secondary: #2196f3;
            --bg: #f4f7f6;
            --text: #333;
            --card-bg: #fff;
            --danger: #f44336;
            --warning: #ffeb3b;
            --coin: #ffc107;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header & HUD --- */
        header {
            background: var(--card-bg);
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; }
        .hud { display: flex; gap: 15px; font-weight: bold; }
        .lives { color: var(--danger); }
        .coins { color: var(--coin); }

        /* --- Layout --- */
        main { flex: 1; padding: 20px; overflow-y: auto; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* --- Map Styling --- */
        .map-path { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .level-node {
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: #e0e0e0; color: #999; border: 4px solid #bdbdbd;
            cursor: not-allowed; font-weight: bold; position: relative;
        }
        .level-node.unlocked { background: white; color: var(--primary); border-color: var(--primary); cursor: pointer; box-shadow: 0 4px 0 var(--primary-dark); }
        .level-node.completed { background: var(--primary); color: white; }
        .connector { width: 8px; height: 25px; background: #e0e0e0; }
        .connector.active { background: #a5d6a7; }

        /* --- Game Styling --- */
        .game-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .code-block {
            background: #272822; color: #f8f8f2; padding: 15px; border-radius: 8px;
            font-family: 'Consolas', monospace; white-space: pre; margin: 15px 0; overflow-x: auto;
        }
        .c-comment { color: #75715e; }
        .c-kw { color: #f92672; }
        .c-str { color: #e6db74; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .option-btn {
            padding: 15px; border: 2px solid #ddd; border-radius: 10px;
            background: #f9f9f9; cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .option-btn:hover:not(:disabled) { background: #eee; }
        .option-btn.correct { background: #c8e6c9; border-color: var(--primary); color: #2e7d32; }
        .option-btn.wrong { background: #ffcdd2; border-color: var(--danger); color: #c62828; }

        .feedback-area {
            margin-top: 20px; padding: 15px; border-radius: 10px; display: none;
            text-align: center; font-weight: bold;
        }
        .btn-continue {
            display: none; width: 100%; padding: 15px; margin-top: 15px;
            background: var(--primary); color: white; border: none; border-radius: 10px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* --- Footer --- */
        footer { background: white; padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid #eee; }
        .nav-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 16px; }
        .nav-btn.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">CodeQuest</div>
    <div class="hud">
        <div class="lives">❤️ <span id="lives-count">3</span></div>
        <div class="coins">🪙 <span id="coins-count">100</span></div>
    </div>
</header>

<main>
    <div class="container">
        <div id="screen-map" class="screen active">
            <h2 style="text-align:center">Your Java Journey</h2>
            <div id="map-container" class="map-path"></div>
        </div>

        <div id="screen-game" class="screen">
            <div class="game-card">
                <div id="lesson-part">
                    <h2 id="lesson-title"></h2>
                    <p id="lesson-desc"></p>
                    <div id="lesson-code" class="code-block"></div>
                    <button class="btn-continue" style="display:block" onclick="startQuiz()">START QUIZ</button>
                </div>

                <div id="quiz-part" style="display:none">
                    <h3 id="question-text"></h3>
                    <div id="question-code" class="code-block"></div>
                    <div id="options-box" class="options-grid"></div>
                    <div id="feedback" class="feedback-area"></div>
                    <button id="next-btn" class="btn-continue" onclick="handleNext()">CONTINUE</button>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <button class="nav-btn active">Map</button>
    <button class="nav-btn">Shop</button>
    <button class="nav-btn">Profile</button>
</footer>

<script>
    /**
     * GAME DATABASE
     * Contains levels, lessons, and English-commented Java code snippets.
     */
    const gameData = [
        {
            id: 1,
            title: "Variables & Output",
            desc: "Learn how to store data and print it to the console.",
            code: `<span class="c-kw">int</span> age = <span class="c-str">20</span>; <span class="c-comment">// Store a number</span>\nSystem.out.println(age);`,
            questions: [
                {
                    q: "What is the correct way to print 'Hello' in Java?",
                    code: "",
                    options: ["print('Hello')", "System.out.println('Hello')", "Console.log('Hello')", "echo 'Hello'"],
                    answer: 1
                },
                {
                    q: "What will this code output?",
                    code: `<span class="c-kw">int</span> x = <span class="c-str">5</span>;\nx = <span class="c-str">10</span>;\nSystem.out.println(x);`,
                    options: ["5", "x", "10", "Error"],
                    answer: 2
                }
            ]
        },
        {
            id: 2,
            title: "Operators",
            desc: "Perform calculations using math operators.",
            code: `<span class="c-kw">int</span> result = <span class="c-str">10</span> % <span class="c-str">3</span>; <span class="c-comment">// Remainder operator</span>`,
            questions: [
                {
                    q: "What is the value of 'result'?",
                    code: `<span class="c-kw">int</span> result = <span class="c-str">10</span> / <span class="c-str">2</span> + <span class="c-str">1</span>;`,
                    options: ["5", "6", "4", "10"],
                    answer: 1
                }
            ]
        }
    ];

    /**
     * APPLICATION STATE
     */
    let state = {
        lives: 3,
        coins: 100,
        unlockedLevel: 1,
        currentLvlIdx: 0,
        currentQIdx: 0
    };

    /**
     * INITIALIZE APP
     */
    function init() {
        renderMap();
        updateHUD();
    }

    function updateHUD() {
        document.getElementById('lives-count').innerText = state.lives;
        document.getElementById('coins-count').innerText = state.coins;
    }

    /**
     * RENDER THE LEARNING PATH
     */
    function renderMap() {
        const container = document.getElementById('map-container');
        container.innerHTML = '';
        gameData.forEach((lvl, i) => {
            if (i > 0) {
                const conn = document.createElement('div');
                conn.className = `connector ${lvl.id <= state.unlockedLevel ? 'active' : ''}`;
                container.appendChild(conn);
            }
            const node = document.createElement('div');
            node.className = `level-node ${lvl.id < state.unlockedLevel ? 'completed' : ''} ${lvl.id === state.unlockedLevel ? 'unlocked' : ''}`;
            node.innerText = lvl.id;
            if (lvl.id <= state.unlockedLevel) node.onclick = () => loadLevel(i);
            container.appendChild(node);
        });
    }

    /**
     * LEVEL & QUIZ LOGIC
     */
    function loadLevel(idx) {
        state.currentLvlIdx = idx;
        state.currentQIdx = 0;
        const level = gameData[idx];

        document.getElementById('lesson-title').innerText = level.title;
        document.getElementById('lesson-desc').innerText = level.desc;
        document.getElementById('lesson-code').innerHTML = level.code;

        document.getElementById('screen-map').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        document.getElementById('lesson-part').style.display = 'block';
        document.getElementById('quiz-part').style.display = 'none';
    }

    function startQuiz() {
        document.getElementById('lesson-part').style.display = 'none';
        document.getElementById('quiz-part').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = gameData[state.currentLvlIdx].questions[state.currentQIdx];
        document.getElementById('question-text').innerText = q.q;
        const qCode = document.getElementById('question-code');
        if(q.code) { qCode.innerHTML = q.code; qCode.style.display='block'; }
        else { qCode.style.display='none'; }

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            box.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(choice, btn) {
        const q = gameData[state.currentLvlIdx].questions[state.currentQIdx];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';

        if (choice === q.answer) {
            btn.classList.add('correct');
            feedback.innerHTML = "✔ CORRECT! Nice job.";
            feedback.style.background = "#e8f5e9";
            state.coins += 10;
        } else {
            btn.classList.add('wrong');
            buttons[q.answer].classList.add('correct');
            feedback.innerHTML = "✘ WRONG! Review the code.";
            feedback.style.background = "#ffebee";
            state.lives--;
        }

        updateHUD();
        document.getElementById('next-btn').style.display = 'block';
        if(state.lives <= 0) { alert("Game Over!"); location.reload(); }
    }

    function handleNext() {
        state.currentQIdx++;
        if (state.currentQIdx < gameData[state.currentLvlIdx].questions.length) {
            showQuestion();
        } else {
            if (state.unlockedLevel === gameData[state.currentLvlIdx].id) {
                state.unlockedLevel++;
            }
            alert("Level Clear!");
            renderMap();
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-map').classList.add('active');
        }
    }

    init();
</script>
</body>
</html>
