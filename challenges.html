<!DOCTYPE html>
<html lang="en">
<head>

    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; } .nav-active { background-color: #f0f7ff; color: #3b82f6; border-right: 4px solid #3b82f6; font-weight: bold; }</style>

<body class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r border-gray-100 flex flex-col">
