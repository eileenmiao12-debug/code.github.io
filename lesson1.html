<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Level 1 — Variables</title>

<style>
body{margin:0;font-family:Consolas,monospace;background:#0f172a;color:white}
.topbar{display:flex;justify-content:space-between;padding:12px 24px;background:#1e293b}
.progress{width:40%;height:12px;background:#334155;border-radius:10px;overflow:hidden}
.progress div{height:100%;width:0%;background:limegreen;transition:.4s}
.container{display:flex;height:calc(100vh - 60px)}
.left{width:40%;padding:20px;background:#111827;overflow:auto}
.left iframe{width:100%;height:220px;border-radius:10px;margin:10px 0}
.right{width:60%;display:flex;flex-direction:column;padding:20px}
textarea{flex:1;background:#0b1020;color:#00ffcc;font-size:16px;border:none;padding:15px;border-radius:10px}
button{padding:10px 16px;margin:6px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.output{background:#1e293b;padding:10px;border-radius:8px;margin-top:10px;min-height:60px}
.choice{display:block;margin:8px 0;padding:8px;background:#1f2937;border-radius:6px;cursor:pointer}
.congrats{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;font-size:48px;color:gold;flex-direction:column;display:none}
</style>
</head>

<body>

<div class="topbar">
<div>❤️ <span id="lives">3</span> | ⭐ <span id="xp">0</span> | 🪙 <span id="coins">0</span></div>
<div class="progress"><div id="bar"></div></div>
</div>

<div class="container">
<div class="left">
<h2 id="title">Variables in Java</h2>
<div id="lesson"></div>
<iframe src="https://www.youtube.com/embed/so1iUWaLmKA" allowfullscreen></iframe>
</div>

<div class="right">
<div id="questionArea"></div>
<textarea id="code" placeholder="Write code here..."></textarea>
<div>
<button onclick="submitAnswer()">Submit</button>
</div>
<div class="output" id="output">Follow the lesson and answer the question.</div>
</div>
</div>

<div class="congrats" id="congrats">
🎉 CONGRATULATIONS 🎉
<button onclick="location.reload()">Play Again</button>
</div>

<script>
let xp=0,lives=3,progress=0,coins=parseInt(localStorage.getItem("coins")||0);
document.getElementById("coins").innerText=coins;

const questions=[
{
type:"choice",
lesson:"A variable stores data. You must declare its type.",
q:"Which is a correct variable declaration?",
choices:["age = 16;","int age = 16;","variable age = 16;"],
a:1
},
{
type:"type",
lesson:"Use System.out.println() to print values.",
q:"Create int age = 16 and print it.",
check:(code)=>code.includes("int age")&&code.includes("16")&&code.includes("println"),
hint:"Declare int age and print it."
},
{
type:"choice",
lesson:"String stores text.",
q:"Which stores text?",
choices:["int","String","double"],
a:1
},
{
type:"type",
lesson:"double stores decimals.",
q:"Create double price = 9.99 and print it.",
check:(code)=>code.includes("double price")&&code.includes("9.99")&&code.includes("println"),
hint:"Use double price."
}
];

const reviveQs=[
{q:"Java keyword for integer?",a:"int"},
{q:"Command to print?",a:"System.out.println"},
{q:"Type for text?",a:"String"},
{q:"Decimal type?",a:"double"},
{q:"Boolean values?",a:"true false"}
];

let current=0,reviveMode=false,reviveIndex=0;

function loadQ(){
let q=questions[current];
document.getElementById("lesson").innerText=q.lesson;
document.getElementById("code").style.display=q.type==="type"?"block":"none";
let qa=document.getElementById("questionArea");
qa.innerHTML="<h3>"+q.q+"</h3>";
if(q.type==="choice"){
q.choices.forEach((c,i)=>{
qa.innerHTML+=`<div class='choice' onclick='choose(${i})'>${c}</div>`;
});
}
updateBar();
}

function choose(i){
if(i===questions[current].a) correct();
else wrong("Review the lesson.");
}

function submitAnswer(){
if(reviveMode){
let val=document.getElementById("code").value.trim().toLowerCase();
if(val.includes(reviveQs[reviveIndex].a.toLowerCase())) reviveIndex++;
else lives--;
if(reviveIndex>=5){ reviveMode=false;lives=3;loadQ();return;}
if(lives<=0){alert("Failed revival!");location.reload();}
document.getElementById("output").innerText="Revive Question: "+reviveQs[reviveIndex].q;
return;
}

let q=questions[current];
if(q.type==="type"){
if(q.check(document.getElementById("code").value)) correct();
else wrong(q.hint);
}
}

function correct(){
xp+=20;coins+=5;progress+=25;
localStorage.setItem("coins",coins);
document.getElementById("xp").innerText=xp;
document.getElementById("coins").innerText=coins;
document.getElementById("output").innerText="✅ Correct!";
current++;
if(current>=questions.length){
document.getElementById("congrats").style.display="flex";
}else loadQ();
}

function wrong(hint){
lives--;
document.getElementById("lives").innerText=lives;
document.getElementById("output").innerText="❌ "+hint;
if(lives<=0) startRevive();
}

function startRevive(){
reviveMode=true;reviveIndex=0;lives=3;
document.getElementById("code").style.display="block";
document.getElementById("output").innerText="Revive Mode! "+reviveQs[0].q;
}

function updateBar(){
document.getElementById("bar").style.width=progress+"%";
}

loadQ();
</script>
</body>
</html>
